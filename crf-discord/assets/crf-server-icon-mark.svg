<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B8CFF"/>
      <stop offset="100%" stop-color="#3ED6B5"/>
    </linearGradient>
  </defs>

  <!-- 波紋マーク+CRF文字の組み合わせ版 -->
  <rect width="512" height="512" fill="#171B2B"/>

  <!-- 上部: 波紋マーク(中心の点=観察する意識) -->
  <g fill="none" stroke="url(#g)" stroke-linecap="round" transform="translate(256,190) scale(0.56) translate(-256,-256)">
    <circle cx="256" cy="256" r="26" fill="url(#g)" stroke="none"/>
    <path d="M 328 176 A 108 108 0 1 0 328 336" stroke-width="34"/>
    <path d="M 380 124 A 182 182 0 1 0 380 388" stroke-width="30" opacity="0.6"/>
  </g>

  <!-- 下部: CRF -->
  <text x="256" y="428" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="108" font-weight="bold" letter-spacing="10"
        fill="#EAECF5">CRF</text>
</svg>

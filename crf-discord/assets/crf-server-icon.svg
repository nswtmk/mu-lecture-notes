<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B8CFF"/>
      <stop offset="100%" stop-color="#3ED6B5"/>
    </linearGradient>
  </defs>

  <!-- Discordサーバーアイコン用: 円形切り抜き前提・小サイズでも「CRF」が読める -->
  <rect width="512" height="512" fill="#171B2B"/>

  <!-- 背景の波紋(控えめ) -->
  <g fill="none" stroke="url(#g)" stroke-linecap="round">
    <path d="M 396 116 A 198 198 0 1 0 396 396" stroke-width="18" opacity="0.30"/>
    <path d="M 358 154 A 144 144 0 1 0 358 358" stroke-width="16" opacity="0.16"/>
  </g>

  <!-- CRF ロゴタイプ -->
  <text x="256" y="298" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="150" font-weight="bold" letter-spacing="6"
        fill="url(#g)">CRF</text>
</svg>
